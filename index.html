<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Cadet Lesson Planner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
background:#0f172a;
color:white;
margin:0;
display:flex;
}

.sidebar{
width:230px;
background:#020617;
height:100vh;
padding:20px;
border-right:1px solid #1e293b;
}

.sidebar h2{
margin-bottom:25px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
background:none;
border:none;
color:white;
text-align:left;
cursor:pointer;
border-radius:6px;
}

.sidebar button:hover{
background:#111827;
}

.main{
flex:1;
padding:25px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
background:#020617;
color:white;
}

button.action{
padding:12px 18px;
border:none;
border-radius:6px;
margin-top:10px;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

button.secondary{
background:#38bdf8;
}

#dropZone{
margin-top:15px;
padding:20px;
border:2px dashed #38bdf8;
border-radius:10px;
text-align:center;
background:#020617;
}

#output{
white-space:pre-wrap;
background:#020617;
padding:15px;
border-radius:8px;
margin-top:15px;
line-height:1.5;
}

.page{
display:none;
}

.page.active{
display:block;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Cadet Planner</h2>

<button onclick="showPage('dashboard')">Dashboard</button> <button onclick="showPage('generator')">Lesson Generator</button> <button onclick="showPage('talking')">Talking Points</button>

</div>

<div class="main">

<div id="dashboard" class="page active card">
<h2>Cadet Lesson Planner</h2>
<p>Generate cadet training lessons using AI and your lesson templates.</p>
</div>

<div id="generator" class="page card">

<h2>Lesson Generator</h2>

<label>Instructor Rank</label> <input id="rank">

<label>Instructor Name</label> <input id="name">

<label>Training Area</label> <select id="area">

<option>Navigation</option>
<option>Fieldcraft</option>
<option>Drill</option>
<option>First Aid</option>
<option>Leadership</option>
</select>

<label>Lesson Topic</label> <input id="topic">

<label>Cadet Level</label> <select id="cadetRank">

<option>REC</option>
<option>CDT</option>
<option>LCPL</option>
</select>

<label>Duration (minutes)</label> <input id="duration">

<div id="dropZone">Drag Word Lesson Template Here</div>

<button class="action" onclick="generateLesson()">Generate Lesson</button> <button class="action secondary" onclick="downloadWord()">Download Word</button> <button class="action secondary" onclick="downloadPDF()">Download PDF</button>

<div id="output"></div>

</div>

<div id="talking" class="page card">

<h2>Talking Points Generator</h2>

<label>Topic</label> <input id="talkTopic">

<button class="action" onclick="generateTalking()">Generate Talking Points</button>

<div id="talkOutput"></div>

</div>

</div>

<script>

const API_KEY = AIzaSyAduFDoGvcETm4A86rqBVYwuxD1_59oa4E

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
}

let templateText=""
let generatedLesson=""

const dropZone=document.getElementById("dropZone")

dropZone.addEventListener("dragover",e=>e.preventDefault())

dropZone.addEventListener("drop",e=>{

e.preventDefault()

const file=e.dataTransfer.files[0]

const reader=new FileReader()

reader.onload=function(event){

mammoth.extractRawText({arrayBuffer:event.target.result})
.then(function(result){

templateText=result.value
dropZone.textContent="Template Loaded"

})

}

reader.readAsArrayBuffer(file)

})

async function generateLesson(){

if(!templateText){
alert("Upload template first")
return
}

const topic=document.getElementById("topic").value
const area=document.getElementById("area").value
const duration=document.getElementById("duration").value
const cadetRank=document.getElementById("cadetRank").value
const name=document.getElementById("name").value
const rank=document.getElementById("rank").value

const prompt = `
You are creating an Australian Army Cadets lesson plan.

Read the template and identify the headings.

Fill each section with clear instructor notes suitable for cadet training.

Do NOT change headings.

Template:

${templateText}

Lesson Details:
Topic: ${topic}
Training Area: ${area}
Cadet Level: ${cadetRank}
Duration: ${duration} minutes
Instructor: ${name} (${rank})

Return the completed lesson plan.
`

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
})

const data=await response.json()

const ai=data.candidates?.[0]?.content?.parts?.[0]?.text || "AI Error"

generatedLesson=ai

document.getElementById("output").textContent=ai

}

async function generateTalking(){

const topic=document.getElementById("talkTopic").value

const prompt=`Create cadet instructor talking points for ${topic}`

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
})

const data=await response.json()

document.getElementById("talkOutput").textContent =
data.candidates?.[0]?.content?.parts?.[0]?.text

}

function downloadWord(){

const blob=new Blob([generatedLesson],{type:"application/msword"})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="AAC_Lesson.doc"

a.click()

}

function downloadPDF(){

const { jsPDF } = window.jspdf

const pdf = new jsPDF()

const lines = pdf.splitTextToSize(generatedLesson,180)

pdf.text(lines,10,10)

pdf.save("AAC_Lesson.pdf")

}

</script>

</body>
</html>
